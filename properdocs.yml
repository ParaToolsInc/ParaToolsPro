site_name: ParaTools Pro for E4S™ Documentation
site_url: https://docs.paratoolspro.com/
site_description: ParaTools Pro for E4S™ - HPC documentation, tutorials, and cloud deployment guides for AWS, GCP, Azure, and Heidi
theme:
  name: material
  custom_dir: overrides
  logo: assets/paratools-pro-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.breadcrumbs
    - toc.follow
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
  language: en
  font:
    text: Open Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - redirects:
      redirect_maps:
        'ODDC/getting-started-ODDC.md': 'Heidi/getting-started-Heidi.md'
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true
#   - privacy:
#       enabled: !ENV [CI, false]

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - .
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

extra:
  # We don't use cookies and so don't need the cookie consent.
  # If we ever do start to use cookies, restore this.
  # consent:
  #   title: Cookie consent
  #   description: >-
  #     We use cookies to recognize your repeated visits and preferences, as well
  #     as to measure the effectiveness of our documentation and whether users
  #     find what they're searching for. With your consent, you're helping us to
  #     make our documentation better.
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ParaToolsInc/ParaToolsPro

copyright: |
  &copy; 2023-2026 <a href="https://www.paratools.com/" target="blank" rel="noopener">ParaTools, Inc.</a>

extra_css:
  - assets/stylesheets/extra.css

# Page tree
nav:
  - Home: index.md
  - AWS:
    - Getting Started with Parallel Cluster: AWS/getting-started-AWS.md
    - Getting Started with Parallel Computing Service: AWS/getting-started-AWS-PCS.md
      #    - AWS Parallel Cluster Config: AWS/pcluster.md
  - GCP:
    - Getting Started: GCP/getting-started-GCP.md
    - Cluster Blueprint: GCP/blueprint.md
    - Cluster Deletion: GCP/Cluster-Deletion.md
  - Heidi:
    - Getting Started: Heidi/getting-started-Heidi.md
  - Azure:
    - Getting Started: Azure/getting-started-Azure.md
  - EULA: EULA.md
  - Privacy Policy: privacy.md
