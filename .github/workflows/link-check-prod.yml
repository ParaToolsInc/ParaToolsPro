name: Docs Link Audit

on:
  schedule:
    - cron: '37 8 * * 3'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: link-check-prod
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://docs.paratoolspro.com
      REPORT_PATH: link-report.md
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config --global user.email "279612+zbeekman@users.noreply.github.com"
          git config --global user.name "zbeekman"

      - name: Install muffet
        run: |
          go version
          go install github.com/raviqqe/muffet/v2@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Crawl site
        id: muffet
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          muffet \
            --buffer-size=32768 \
            --max-connections=10 \
            --rate-limit=5 \
            --timeout=30 \
            --ignore-fragments \
            --header="User-Agent: ParaToolsProLinkChecker/1.0 (+https://github.com/ParaToolsInc/ParaToolsPro)" \
            --accepted-status-codes=200,204,206,301,302,304,401,403,405,418,429 \
            "$SITE_URL" > muffet.out 2>&1
          EXIT=$?
          set -e
          PAGES=$(curl -fsSL "$SITE_URL/sitemap.xml" | grep -c '<loc>' || true)
          if [ "$EXIT" -eq 0 ]; then
            echo "::notice::Crawl OK - $PAGES source pages in sitemap, 0 broken links on $SITE_URL"
          else
            ERRORS=$(grep -cE '^\s+(->|lookup|Get |status code)' muffet.out || true)
            echo "::error::muffet exit=$EXIT - $ERRORS error lines across $PAGES source pages"
          fi
          {
            echo '# Link check report'
            echo
            echo "- Site: $SITE_URL"
            echo "- Run: $RUN_URL"
            echo "- Source pages (sitemap): $PAGES"
            echo "- muffet exit code: $EXIT"
            echo
            if [ "$EXIT" -eq 0 ]; then
              echo '**Result:** No broken links detected.'
            else
              echo '**Result:** Broken links detected. Output:'
              echo
              echo '```'
              cat muffet.out
              echo '```'
            fi
          } > "$REPORT_PATH"
          echo "::group::Broken links report ($REPORT_PATH)"
          cat "$REPORT_PATH"
          echo "::endgroup::"
          {
            echo "## Link check summary"
            echo
            echo "- Site: $SITE_URL"
            echo "- muffet exit code: $EXIT"
            echo
            echo '<details><summary>Full report</summary>'
            echo
            cat "$REPORT_PATH"
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"

      - name: Upload link report
        if: steps.muffet.outputs.exit_code != 0
        uses: actions/upload-artifact@v7
        with:
          name: link-report
          path: ${{ env.REPORT_PATH }}
          retention-days: 7

      - name: Create fix branch
        id: branch
        if: steps.muffet.outputs.exit_code != 0
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH_NAME="claude/link-fixes-${RUN_ID}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Attempt auto-fix with Claude Code
        id: claude
        if: steps.muffet.outputs.exit_code != 0
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_id: 279612
          bot_name: zbeekman
          show_full_output: true
          claude_args: "--allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(cat:*),Bash(ls:*)'"
          prompt: |
            Broken links detected by muffet on ${{ env.SITE_URL }}.
            Report: ${{ env.REPORT_PATH }} (at repo root).
            Branch: ${{ steps.branch.outputs.branch_name }} (already checked out).
            Base branch: ${{ github.event.repository.default_branch }}.
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Workflow file: .github/workflows/link-check-prod.yml
            Muffet docs: https://raviqqe.com/muffet/usage

            Your task: triage each reported error into one of three categories.

            =========================================================================
            A. REAL broken link with OBVIOUS fix -> fix the docs
            =========================================================================
            Criteria:
              - HTTP 404/410/5xx on full URL
              - AND fix is unambiguous:
                  - http -> https
                  - missing/extra trailing slash
                  - typo you are 100% certain about
                  - internal page rename with clear redirect target (add entry to
                    mkdocs-redirects config in `properdocs.yml` or `mkdocs.yml`)
                  - clear moved target (vendor moved docs to new path, same host)

            Action: edit source markdown in `docs/**/*.md` (or redirect config).
            Commit subject: "docs: auto-fix broken links (weekly crawl)"
            Commit body trailer: Co-authored-by: Claude <noreply@anthropic.com>
            Push branch, open PR via `gh pr create`:
              - title: "docs: auto-fix broken links detected by muffet"
              - body: contents of ${{ env.REPORT_PATH }}
              - labels: docs, broken-links, automated

            =========================================================================
            B. SUSPECTED FALSE POSITIVE with OBVIOUS workflow fix
            =========================================================================
            Current workflow already enables `--ignore-fragments` globally, so
            anchor/fragment errors should never appear in the report. Remaining
            false-positive classes:
              - 401 / 403 / 429 status (auth required / bot-detection / rate limit)
              - Timeout / connection reset / TLS handshake errors
              - Buffer-size errors (large response headers from a host)
              - Host that blocks automated crawlers regardless of UA (e.g. serves
                different content to bots)
              - URL manifestly resolves in a normal browser (spot-check suspicious
                reports if uncertain)

            If the workflow can be tuned so this class of error stops appearing,
            apply the tuning. Examples of OBVIOUS workflow fixes:
              - Add `--exclude=<regex>` to the muffet invocation to skip a specific
                host or URL pattern that is a confirmed false positive. Prefer the
                narrowest pattern that eliminates the noise (host-specific, not
                wildcard).
              - Bump `--buffer-size` if buffer errors persist
              - Bump `--timeout` if timeouts look like network-blip pattern
              - Add `--header="..."` to pass through a header a host requires
              - Add a status code to `--accepted-status-codes` IF and only if the
                code is a clear warning (e.g. 418 teapot)

            DO NOT:
              - Add blanket excludes that would suppress real errors
              - Remove `--accepted-status-codes` entries already present
              - Remove `--ignore-fragments` (intentional: fragment checks against
                raw HTML produce too many false positives on JS-rendered sites)

            Action: edit `.github/workflows/link-check-prod.yml`.
            Commit subject: "ci(link-check): suppress known false-positive links"
            Commit body: explain which pattern/host and why it's a false positive;
              end with Co-authored-by: Claude <noreply@anthropic.com>
            Push branch, open PR via `gh pr create`:
              - title: "ci(link-check): reduce false positives from <host or reason>"
              - body: include the relevant excerpt of ${{ env.REPORT_PATH }},
                explain the fix, and note what remains for human triage (if any)
              - labels: ci, broken-links, automated

            =========================================================================
            C. AMBIGUOUS / non-obvious -> open an issue
            =========================================================================
            Use this when you can neither fix the doc confidently nor tune the
            workflow confidently. Open a GitHub issue via `gh issue create`:
              - title: "Broken links detected on ${{ env.SITE_URL }}"
              - body: full contents of ${{ env.REPORT_PATH }}, a link to the
                workflow run, and YOUR TRIAGE NOTES for each error:
                  * classification (real / suspected-false-positive / unsure)
                  * brief reason
                  * suggested manual next step
                If any errors are suspected false positives, call that out
                explicitly in the issue body ("note: N of M errors appear to be
                false positives; see triage notes").
              - labels: docs, broken-links
                (add `false-positive-suspected` label if applicable; create the
                label first via `gh label create` if it doesn't exist.)

            =========================================================================
            RULES (all categories)
            =========================================================================
            - Pick exactly ONE category per run. If you fix any docs (A), do NOT
              also tune the workflow (B) in the same commit/PR -- open a separate
              issue (C) to flag the workflow tuning need. One concern per PR.
            - Prefer A over B when a doc fix resolves the error directly.
            - DO NOT silence checks, delete broken links silently, or hide evidence.
            - The commit author is configured to be zbeekman. Local git identity is
              already set.

            Output a one-line summary of action taken (PR URL or issue URL).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if broken links remain
        if: steps.muffet.outputs.exit_code != 0
        run: |
          echo "::error::Broken links detected on ${SITE_URL}. See artifact 'link-report' and the opened PR or issue."
          exit 1
